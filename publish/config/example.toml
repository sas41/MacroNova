# MacroNova example configuration
# Copy to ~/.config/macronova/config.toml and edit as needed.
#
# Button names use the evdev raw address:  "<eventN>/key0x<HHHH>"
#
# <eventN>  = basename of the /dev/input/eventN node for your device.
#             Discovered automatically via /dev/input/by-id/ symlinks.
# <HHHH>    = 4-digit lowercase hex EV_KEY code.
#
# Use the GUI "Capture" button to discover the exact name for any button.
#
# Common G502 X Lightspeed codes (event5 = mouse node):
#   event5/key0x0110  BTN_LEFT      (left click)
#   event5/key0x0111  BTN_RIGHT     (right click)
#   event5/key0x0112  BTN_MIDDLE    (scroll wheel click)
#   event5/key0x0113  BTN_SIDE      (back thumb button)
#   event5/key0x0114  BTN_EXTRA     (forward thumb button)
#   event5/key0x0115  BTN_FORWARD   (top side button 1)
#   event5/key0x0116  BTN_BACK      (top side button 2)
#   event5/key0x0117  code279       (sniper button)
#   event5/key0x0118  code280       (DPI cycle / extra)

[device.G502X]
wpid = "407F"

[[device.G502X.bindings]]
button = "event5/key0x0116"
on_press = "macros/undo.rhai"

[[device.G502X.bindings]]
button = "event5/key0x0115"
on_press = "macros/redo.rhai"

[[device.G502X.bindings]]
button = "event5/key0x0118"
on_press = "macros/click_repeat.rhai"
